    <script language="javascript" type="text/javascript" data-javascript-target="canvas">
  var x = [],
  y = [],
  segNum = 40,
  segLength = 18;
  m = -450;
  k = -400;
  k = -400;
  k = -400;
  j = -350;
  h = -300;
  g = -250;
  f = -200;
  d = -100;
  c = -50;
  b = 0;
  e = -150;
  
  z=800;
  c=1000;
  zspeed= 900;
  cspeed = 100;

for (var i = 0; i < segNum; i++) {
  x[i] = 0;
  y[i] = 0;
}

function preload(){
  orange = loadImage("orange.png");
  ivy = loadImage("invy.png");
}
function setup(){
  createCanvas(windowWidth*2, windowHeight*2);
  strokeWeight(9);
    stroke(255,0,0);
}

function draw(){
    c = c + 1;
     z = z + 1;

    if(c >= windowWidth){
        c = 0;
    }

    if(z >= windowHeight){
        z=0;
    }
  dragSegment(0, z, c);
  for( var i=0; i<x.length-5; i++) {
    dragSegment(i+1, x[i], y[i]);
  }
}

function dragSegment(i, xin, yin) {
  var dx = xin - x[i];
  var dy = yin - y[i];
  var angle = atan2(dy, dx);
  x[i] = xin - cos(angle) * segLength;
  y[i] = yin - sin(angle) * segLength;
  segment(x[i], y[i], angle);
}

function segment(x, y, a) {
  m = m -.1;
  k = k - .001;
  j = j - .001;
  h = h - 0.001;
  g = g - .001;
  f = f - 0.001;
  e = e - .001;
  d = d - .001;
  c = c - .001;
  b = b - .001;
  push();
  translate(x, y);
  rotate(a);
  img = ivy;
  if (mouseIsPressed){
    img = orange;
  } else {
    img = ivy;
  }
  image(img, m,m);
  image(img,k,k);
  image(img,j,j);
  image(img,h,h);
  image(img,g,g);
  image(img, f, f);
  image(img,e,e);
  image(img,d,d);
  image(img,c,c);
  image(img,b,b);

  pop();
  if(m<=-500){
    m=0;
  }
  if(k <= -500){
    k = 0;
  }
  if(j<=-500){
    j = 0;
  }
  if(h<=-500){
    h = 0;
  }
  if(g <= -500){
    g = 0;
  }
  if(f <= -500){
    f = 0;
  }
  if(e <= -500){
    e = 0;
  }
  if(b <= -500){
    b = 0;
  }
  if(c <= -500){
    c = 0;
  }
  if (d<= -500){
    d = 0;
  }
}

</script>
