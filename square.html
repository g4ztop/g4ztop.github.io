<html>
    <head>
        <title> Mitchell Craft </title>
<script language="javascript" type="text/javascript" src="p5-zip/p5.js"></script>
<script language="javascript" type="text/javascript" src="p5-zip/addons/p5.sound.js"></script>
<script language="javascript" type="text/javascript" data-javascript-target="canvas">

var osc;
var osc2;

function setup(){
	createCanvas(innerWidth,innerHeight,WEBGL);
	osc = new p5.Oscillator();
	osc.setType('sine');
	osc.start();
	osc2 = new p5.Oscillator();
	osc2.setType('sine');
	osc2.start();
}
function draw(){
	osc.freq(touchX);
	osc2.freq(touchY*2);
	background(255,50,touchX/5);
	//rect1
	ambientLight(255,255,255);
  push();
  ambientMaterial(121,255,touchX/5);
  rotateY(radians(touchY/2));
  rotateX(radians(touchX/5));
  box(10,touchY,touchY/2);
  pop(); 
  push();
  ambientMaterial(121,touchX/5,200);
  rotateY(radians(touchY/2));
  rotateX(radians(touchX/5.001));
  box(10,touchY,touchY/2);
  pop();
  //rect2
  push();
  ambientMaterial(121,255,touchX/5);
  rotateY(radians(touchY));
  rotateX(radians(touchX/5));
  box(10,touchY,touchY/2);
  pop();
  push();
  ambientMaterial(121,touchX/5,200);
  rotateY(radians(touchY));
  rotateX(radians(touchX/5.001));
  box(10,touchY,touchY/2);
  pop();
  //rect3
  push();
  ambientMaterial(touchX/5,50,touchX/5);
  rotateY(radians(touchX/5));
  rotateX(radians(touchY/5.002));
  box(10,touchY,touchX/3);
  pop();
  push();
  ambientMaterial(255,255,touchX/5);
  rotateY(radians(touchX/5));
  rotateX(radians(touchY/5.003));
  box(10,touchY,touchX/3);
  pop();
    //rect4
  push();
  ambientMaterial(touchX/5,50,touchX/5);
  rotateY(radians(touchX/3));
  rotateX(radians(touchY/5.002));
  box(10,touchY,touchX/3);
  pop();
  push();
  ambientMaterial(255,255,touchX/5);
  rotateY(radians(touchX/3));
  rotateX(radians(touchY/5.003));
  box(10,touchY,touchX/3);
  pop();
}
function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>


<style type="text/css">
    canvas{
        position:relative;
        top:-160;
        left: -20;
    }
        </style>
<canvas id="canvas"></canvas>
        
    </head>
</html>
