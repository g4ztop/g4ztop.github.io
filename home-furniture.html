<script language="javascript" type="text/javascript" src="p5-zip/p5.js"></script>

<script language="javascript" type="text/javascript" data-javascript-target="canvas">
var sp1 = 0;
var sp2 = 0;

function setup(){
	createCanvas(windowWidth,windowHeight,WEBGL);

}

function draw(){
	background(mouseY/4,255,mouseX/6);
	 var locY = (mouseY / height - 0.5) * (-2);
  var locX = (mouseX / width - 0.5) * 2;

  ambientLight(50,0,200);
  directionalLight(200, 0, 255, 0.25, 0.25, 0.25);
  pointLight(mouseY/4, 0, 0, locX, locY, 0);
  pointLight(mouseX/4, 0, 0, -locX, -locY, 0);
	

	push();
	translate(-100,0,0);
	rotateX(frameCount * sp1);
	rotateZ(frameCount * sp1/20);
	rotateY(frameCount * 0.01);
	box(20,20,20);
	translate(0,-20,0);
	box(25,4,25);
	translate(0,-4,0);
	box(20,4,20);
	translate(0,-4,0);
	box(16,4,16);
	translate(0,-4,0);
	box(12,4,12);
	pop();
	push();
	translate(-20,0,0);
	rotateY(frameCount * -0.01);
	rotateX(frameCount * -sp1);
	rotateY(frameCount * -sp1/20);
	box(15,4,15);
	translate(10,-6,10);
	box(4,25,4);
	translate(0,0,-20);
	box(4,25,4);
	translate(-20,15,0);
	box(4,10,4);
	translate(0,0,20);
	box(4,10,4);
	translate(20,-35,-10);
	box(4,4,10);
	if (mouseIsPressed)
		sp1 = 1;
	else
		sp1 = 0;
}



</script>



<canvas id="canvas"></canvas>
